name: Report a crash
description: superzent crashes, freezes, or hangs.
type: Crash
labels: "state:needs triage"
body:
  - type: textarea
    attributes:
      label: Reproduction steps
      description: Describe the shortest reliable way to trigger the crash or hang.
      placeholder: |
        1. Start superzent
        2. Open ...
        3. The app crashes
    validations:
      required: true
  - type: textarea
    attributes:
      label: superzent version and system specs
      description: In the app, copy system specs from the command palette and paste them here.
      placeholder: |
        superzent: v0.1.0
        OS: macOS 15.3
        Memory: 36 GiB
        Architecture: aarch64
    validations:
      required: true
  - type: textarea
    attributes:
      label: Attach log output
      description: Open the app log from the command palette and paste the relevant lines here after redacting secrets.
      value: |
        <details><summary>superzent.log</summary>

        ```log

        ```

        </details>
    validations:
      required: false
